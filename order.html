   <header>

   <section class="hero">
    <h2>Place Your Order</h2>
    <p>Fill out the form below to place your order with NAVIGA CLOTHING.</p>

   <hr>

   <main>

    <form>

        <h2>customer information</h2>

        <label>Full Name</label><br>
        <input type="text"placeholder=" enter Your full Name" required><br><br>

        <label>Email</label><br>
        <input type="Email" placeholder="Your Email" required><br><br>

        <label>phone</label><br>
        <input type="text" placeholder="Your Phone number" required><br><br>

        <h2>Order details</h2>

        <label>product:</label><br>
        <select>
        <option>slouchy beanie-R150</option>
        <option>comfort hoodie-R300</option>
        <option>butterfly t-shirt-R250</option>
        </select><br>

        <label>size</label><br>
        <select>
            <option>Small</option> 
        <option>Medium</option>
        <option>large</option>


        </select><br><br>
        <label>quantity:</label><br>
        <input type="number"value="1"><br><br>

        <label>delivery address</label>
        <textarea placeholder="enter address"required></textarea><br><br>

        <button type="submit"class="button"> submit order</button>
    </form>
   </main>
